<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo-section">
        <img src="logo.png" class="logo" alt="logo">
        <h2>Florian Florist</h2>
    </div>

    <div class="nav-icons">
        <i class="bi bi-person-circle"></i>
    </div>

</nav>

<!-- DASHBOARD LAYOUT -->
<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <a href="index.html"><i class="bi bi-grid-fill"></i> Dashboard</a>
        <a href="products.html"><i class="bi bi-flower1"></i> Products</a>
        <a href="customers.html"><i class="bi bi-people-fill"></i> Customers</a>
        <a href="orders.html"><i class="bi bi-bag-fill"></i> Orders</a>
        <a href="payments.html"><i class="bi bi-credit-card-fill"></i> Payments</a>
        <a href="inventory.html"><i class="bi bi-box-seam-fill"></i> Inventory</a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <h1>Dashboard Overview</h1>

        <div class="welcome-card">
    <h2>Welcome to Florian Florist Admin Panel 🌸</h2>
    <p>Manage products, customers, orders, payments and inventory from one dashboard.</p>
</div>

        <div class="stats">

            <div class="card">
                <h2 id="products">0</h2>
                <p>Products</p>
            </div>

            <div class="card">
                <h2 id="customers">0</h2>
                <p>Customers</p>
            </div>

            <div class="card">
                <h2 id="orders">0</h2>
                <p>Orders</p>
            </div>

            <div class="card">
                <h2 id="payments">0</h2>
                <p>Payments</p>
            </div>

            <div class="card">
                <h2 id="inventory">0</h2>
                <p>Inventory</p>
            </div>

        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>
fetch("http://localhost:5000/dashboard-stats")
.then(res => res.json())
.then(data => {

    document.getElementById("products").innerText = data.products;
    document.getElementById("customers").innerText = data.customers;
    document.getElementById("orders").innerText = data.orders;
    document.getElementById("payments").innerText = data.payments;
    document.getElementById("inventory").innerText = data.inventory;

});
</script>

</body>
</html>
