<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Flower Shop Admin</h2>

        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="customers.html">Customers</a>
        <a href="orders.html">Orders</a>
        <a href="payments.html">Payments</a>
        <a href="inventory.html">Inventory</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h1>Orders</h1>

            <a href="add-order.html">
                <button>Add Order</button>
            </a>
        </div>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="orderTable"></tbody>
        </table>

    </div>

</div>

<script>
fetch("http://localhost:5000/orders")
.then(res => res.json())
.then(data => {
    let rows = "";

    data.forEach(o => {
        rows += `
            <tr>
                <td>${o.id}</td>
                <td>${o.product}</td>
                <td>${o.quantity}</td>
                <td>${o.total}</td>
                <td>${o.status}</td>
            </tr>
        `;
    });

    document.getElementById("orderTable").innerHTML = rows;
});
</script>

</body>
</html>
